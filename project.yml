name: Whereabouts
options:
  bundleIdPrefix: com.bamcope
  # 中文为主语言;英文为第二语言。配合 Localizable.xcstrings 提供翻译。
  developmentLanguage: zh-Hans
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# Xcode "known regions" — 控制 CFBundleLocalizations 和 .lproj 资源加载。
# Base 用来给 storyboard 之类共享资源占位(本项目没用,但加上无害)。
knownRegions:
  - zh-Hans
  - en
  - Base

settings:
  # 本机 xcodegen 缺 SettingPresets → Debug/Release 的默认编译条件不会自动写入,
  # 这里显式补上,否则 `#if DEBUG` 在 Debug 构建里也是 false。
  configs:
    debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    release:
      SWIFT_COMPILATION_MODE: wholemodule
  base:
    SWIFT_VERSION: "5.10"
    # Phase 116:Bam 的 Apple Developer 个人团队(2026-07-08 审核通过)。
    DEVELOPMENT_TEAM: "6893263DW5"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    # 自己提供 Info.plist,不让 Xcode 自动生成(部分 key 它不让我们改,比如 CFBundleIconFile)
    GENERATE_INFOPLIST_FILE: NO

# Phase 111 起拆成两个 target:
#   - Whereabouts     → macOS(原有全部代码不动)
#   - WhereaboutsiOS  → iOS(全新 UI;复用 Models / Parsing / AI / Shared 层)
# 两个 target 用同一个 bundle id —— App Store 的 universal purchase 要求
# iOS / macOS 共用 bundle id 挂在同一条 App record 下。
targets:
  Whereabouts:
    type: application
    platform: macOS
    sources:
      - path: Whereabouts
      # 把 docs/*.md 当作 bundle resource,Help 窗口运行时用 Bundle.main.url 加载渲染。
      - path: docs
        type: folder
        buildPhase: resources
    settings:
      base:
        # 关键:PRODUCT_NAME 走 ASCII,避免 linker adhoc 签名时把中文当成 codesign identifier。
        # 用户看到的"何处"完全靠 CFBundleDisplayName 显示。
        PRODUCT_NAME: Whereabouts
        PRODUCT_BUNDLE_IDENTIFIER: com.bamcope.whereabouts
        INFOPLIST_FILE: Whereabouts/Info.plist
        # Phase 116:日常开发版 entitlements(iCloud,无沙箱)。
        # App Store 提交时换成 Whereabouts-AppStore.entitlements(含沙箱)。
        CODE_SIGN_ENTITLEMENTS: Whereabouts/Whereabouts-Dev.entitlements

  WhereaboutsiOS:
    type: application
    platform: iOS
    sources:
      # iOS 专属 UI + app 入口 + Info.plist + InfoPlist.strings
      - path: WhereaboutsiOS
      # —— 以下为与 macOS 共享的层 ——
      - path: Whereabouts/Models
      - path: Whereabouts/Parsing
      - path: Whereabouts/Shared
      - path: Whereabouts/AI/AISettings.swift
      - path: Whereabouts/AI/AIClient.swift
      - path: Whereabouts/AI/Keychain.swift
      - path: Whereabouts/NotificationScheduler.swift
      # 复用的跨平台 sheet / 控件(其余 Views/* 是 macOS 专属,iOS 有自己的实现)
      - path: Whereabouts/Views/ItemEditView.swift
      - path: Whereabouts/Views/TagColorPicker.swift
      - path: Whereabouts/Views/RelatedItemsPicker.swift
      - path: Whereabouts/Views/AmbiguousLocationPicker.swift
      # Phase 119:多选批量编辑三件套(标签/位置/渠道)iOS 复用
      - path: Whereabouts/Views/BatchEditSheets.swift
      # 单一 String Catalog 双端共用;图标资产共用(appiconset 里已有 iOS 1024 图)
      - path: Whereabouts/Localizable.xcstrings
      - path: Whereabouts/Assets.xcassets
      # 帮助文档同样打进 iOS bundle(设置 → 帮助 页读取)
      - path: docs
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: Whereabouts
        # 与 macOS 同 bundle id → App Store universal purchase(一条 App record 两个平台)。
        PRODUCT_BUNDLE_IDENTIFIER: com.bamcope.whereabouts
        INFOPLIST_FILE: WhereaboutsiOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        # Phase 116:iCloud 同步 entitlements。
        CODE_SIGN_ENTITLEMENTS: WhereaboutsiOS/WhereaboutsiOS.entitlements
        # 本机的 xcodegen 是独立二进制,缺 SettingPresets(生成时报 "No iOS settings found"),
        # 平台默认值不会自动写入 —— 这里显式给足,否则 SDKROOT 落回 macosx。
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        CODE_SIGN_IDENTITY: "Apple Development"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
